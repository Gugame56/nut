
<style>
  @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, #app { font-family: 'Prompt', sans-serif; }
  #app {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff0f8 0%, #fce4ec 50%, #f8bbd0 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(16px);
    border-radius: 2rem;
    padding: 2rem 2.5rem;
    width: min(90vw, 420px);
    text-align: center;
    border: 1.5px solid rgba(255,182,193,0.4);
    box-shadow: 0 20px 60px rgba(236,64,122,0.12), 0 4px 16px rgba(0,0,0,0.06);
    position: relative; z-index: 10;
    animation: cardIn 0.7s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(30px) scale(0.9); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .page { display:none; }
  .page.active { display:block; }

  /* Floating particles bg */
  .particle { position:absolute; border-radius:50%; pointer-events:none; z-index:1; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.6); opacity:0.8; }
    100% { transform: translateY(-10vh) rotate(720deg) scale(1.3); opacity:0; }
  }

  /* Page 1 */
  .envelope { font-size:64px; display:inline-block; animation: envBounce 2s ease-in-out infinite; cursor:pointer; }
  @keyframes envBounce {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-12px) rotate(3deg); }
  }
  .title1 { font-size:1.4rem; font-weight:600; color:#c2185b; margin: 0.75rem 0 0.4rem; }
  .sub1   { font-size:0.9rem; color:#e91e63; opacity:0.7; line-height:1.6; }

  /* Shimmer button */
  .btn-main {
    margin-top:1.5rem;
    background: linear-gradient(135deg, #e91e63, #f06292);
    color:#fff; border:none; border-radius:2rem;
    padding:0.75rem 2.5rem; font-size:1rem; font-family:'Prompt',sans-serif;
    cursor:pointer; position:relative; overflow:hidden;
    box-shadow: 0 4px 20px rgba(233,30,99,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-main::after {
    content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
    background: rgba(255,255,255,0.3); transform:skewX(-20deg);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer { 0%{left:-60%} 100%{left:130%} }
  .btn-main:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 8px 28px rgba(233,30,99,0.5); }

  /* Page 2 */
  .video-wrap {
    border-radius:1.2rem; overflow:hidden; aspect-ratio:16/9;
    margin-bottom:1.2rem; background:#fce4ec;
    box-shadow:0 4px 20px rgba(233,30,99,0.15);
    position:relative;
  }
  .video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
  .title2 { font-size:1.5rem; font-weight:600; color:#ad1457; margin-bottom:0.3rem; }
  .sub2   { font-size:0.9rem; color:#e91e63; opacity:0.65; margin-bottom:1.4rem; }

  /* Typing indicator */
  .typing { display:inline-flex; gap:5px; margin:0.6rem 0; align-items:center; }
  .dot { width:8px; height:8px; border-radius:50%; background:#f06292; animation: dotBounce 1.4s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .btn-group { display:flex; justify-content:center; gap:1rem; margin-top:0.5rem; align-items:center; position:relative; min-height:52px; }
  .btn-yes {
    background: linear-gradient(135deg,#e91e63,#f48fb1);
    color:#fff; border:none; border-radius:2rem;
    padding:0.65rem 2rem; font-size:0.95rem; font-family:'Prompt',sans-serif;
    cursor:pointer; box-shadow:0 4px 16px rgba(233,30,99,0.35);
    transition:transform 0.2s,box-shadow 0.2s; z-index:5;
  }
  .btn-yes:hover { transform:scale(1.08); box-shadow:0 6px 24px rgba(233,30,99,0.5); }
  .btn-no {
    background:rgba(240,240,240,0.9); color:#888; border:1.5px solid #ddd;
    border-radius:2rem; padding:0.65rem 1.5rem; font-size:0.95rem; font-family:'Prompt',sans-serif;
    cursor:pointer; transition:all 0.15s; position:absolute; right:0;
    z-index:5;
  }
  .btn-no:hover { background:#f0f0f0; }

  /* Rage counter */
  .rage { font-size:0.75rem; color:#ec407a; margin-top:0.4rem; min-height:1.1rem; }

  /* Page 3 */
  .confetti-msg { font-size:3.5rem; display:inline-block; animation:spinZoom 0.6s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes spinZoom {
    from{transform:scale(0) rotate(-180deg); opacity:0;}
    to{transform:scale(1) rotate(0deg); opacity:1;}
  }
  .title3 { font-size:1.8rem; font-weight:600; color:#e91e63; margin:0.6rem 0 0.3rem; }
  .sub3   { font-size:0.9rem; color:#c2185b; opacity:0.75; }
  /* Progress bar */
  .love-bar-wrap { margin:1.2rem 0 0.3rem; background:rgba(252,228,236,0.7); border-radius:1rem; height:12px; overflow:hidden; }
  .love-bar { height:100%; background:linear-gradient(90deg,#f48fb1,#e91e63); border-radius:1rem; width:0%; animation:fillBar 2s ease forwards 0.5s; }
  @keyframes fillBar { to{width:100%} }
  .love-pct { font-size:0.8rem; color:#e91e63; opacity:0.7; }

  /* Transitions */
  .fade-out { animation:fadeOut 0.35s ease forwards; }
  @keyframes fadeOut { to{opacity:0;transform:scale(0.9);} }

  /* Sparkle container */
  #sparkles { position:absolute; inset:0; pointer-events:none; z-index:20; }
  .sparkle { position:absolute; pointer-events:none; animation:sparklePop 0.8s ease forwards; font-size:22px; }
  @keyframes sparklePop {
    0%{transform:scale(0) rotate(0deg);opacity:1;}
    60%{transform:scale(1.4) rotate(30deg);opacity:1;}
    100%{transform:scale(0) rotate(60deg) translateY(-40px);opacity:0;}
  }
</style>

<div id="app">
  <div id="heart-container" style="position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;"></div>
  <div id="sparkles"></div>

  <div class="card" id="card">
    <!-- PAGE 1 -->
    <div class="page active" id="page1">
      <div class="envelope" onclick="triggerEnvelope()">💌</div>
      <div class="title1">สวัสดีครับน้องนุต ✨</div>
      <div class="sub1">มีความลับสักอย่างอยากบอก<br>กล้าเปิดดูไหมเอ่ย?</div>
      <div style="margin-top:0.8rem;">
        <div id="typewriter" style="font-size:0.85rem;color:#e91e63;opacity:0.6;min-height:1.4rem;letter-spacing:0.05em;"></div>
      </div>
      <button class="btn-main" onclick="goPage2()">เปิดดูเลย 🥺</button>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
      <div class="video-wrap">
        <iframe src="love.mp4"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="title2">เป็นแฟนกันนะ 💖</div>
      <div class="sub2">ให้เราดูแลแกไปตลอดเลยได้ไหม?</div>
      <div class="btn-group">
        <button class="btn-yes" onclick="sayYes()">ตกลงค่ะ 🥰</button>
        <button class="btn-no" id="noBtn" onmouseenter="runAway()" ontouchstart="runAway()">ไม่เอาอ่ะ 😜</button>
      </div>
      <div class="rage" id="rageMsg"></div>
    </div>

    <!-- PAGE 3 -->
    <div class="page" id="page3">
      <div class="confetti-msg">🎉💘🎊</div>
      <div class="title3">เย้! ดีใจมากเลยนะ!</div>
      <div class="sub3">รักที่สุดเลย อยู่ด้วยกันนานๆ นะ 🌸</div>
      <div class="love-bar-wrap"><div class="love-bar"></div></div>
      <div class="love-pct" id="lovePct">ความรัก 0%</div>
      <button class="btn-main" style="margin-top:1rem;" onclick="triggerConfetti()">💝 ส่งรูปนี้ให้เขา!</button>
    </div>
  </div>
</div>

<script>
const icons = ['💖','💕','💗','💓','🌸','🌷','✨','💫','🌺','💝'];
const noMsgs = [
  'เดี๋ยวกดให้ถูกนะ! 😅',
  'มือลื่นหรือเปล่า?? 😤',
  'เห็นปุ่มสีชมพูไหมอ่ะ! 😡',
  'ปุ่มนั้นไม่มีอยู่จริง~ 🫣',
  'กดผิดอีกแล้วว! 🙈',
  'ยอมรับความจริงซะ 💅',
  'ปุ่มนั้นเขินเหมือนกันนะ 🫶',
];
let noCount = 0;
let noSpeed = 1;

function createParticles() {
  const c = document.getElementById('heart-container');
  setInterval(() => {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `left:${Math.random()*100}vw;width:${Math.random()*18+8}px;height:${Math.random()*18+8}px;background:hsl(${330+Math.random()*40},90%,${70+Math.random()*20}%);animation-duration:${Math.random()*4+4}s;animation-delay:${Math.random()*2}s;opacity:${Math.random()*0.5+0.3}`;
    c.appendChild(el);
    setTimeout(()=>el.remove(), 9000);
  }, 400);
  setInterval(() => {
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${Math.random()*100}vw;bottom:-30px;font-size:${Math.random()*16+12}px;z-index:1;animation:floatUp ${Math.random()*4+5}s linear forwards;pointer-events:none`;
    el.textContent = icons[Math.floor(Math.random()*icons.length)];
    const style = document.createElement('style');
    if (!document.querySelector('#floatStyle')) {
      style.id='floatStyle';
      style.textContent='@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-110vh) rotate(360deg);opacity:0}}';
      document.head.appendChild(style);
    }
    c.appendChild(el);
    setTimeout(()=>el.remove(),9000);
  },600);
}

function typeWrite() {
  const txts = ['💭 ถ้าบอกว่าชอบแก...','...จะโกรธไหมนะ?','หรือแค่แอบยิ้ม? 🥺'];
  let ti=0,ci=0;
  const el = document.getElementById('typewriter');
  function type() {
    if(ci<=txts[ti].length){
      el.textContent=txts[ti].slice(0,ci++);
      setTimeout(type,80);
    } else {
      setTimeout(()=>{
        let di=txts[ti].length;
        function del(){
          if(di>=0){el.textContent=txts[ti].slice(0,di--);setTimeout(del,40);}
          else{ti=(ti+1)%txts.length;ci=0;setTimeout(type,400);}
        }
        del();
      },1800);
    }
  }
  type();
}

function triggerEnvelope() {
  const el = document.querySelector('.envelope');
  el.style.animation='none'; el.style.transform='scale(1.3)';
  setTimeout(()=>el.style.transform='', 200);
  spawnSparkles(window.innerWidth/2, window.innerHeight/2, 6);
}

function spawnSparkles(x,y,count) {
  const c = document.getElementById('sparkles');
  const sparkIcons=['✨','💫','⭐','🌟','💥'];
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className='sparkle';
    s.textContent=sparkIcons[Math.floor(Math.random()*sparkIcons.length)];
    const angle=Math.random()*Math.PI*2, r=40+Math.random()*60;
    s.style.left=(x+Math.cos(angle)*r-11)+'px';
    s.style.top=(y+Math.sin(angle)*r-11)+'px';
    c.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}

function goPage2() {
  const card=document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(()=>{
    card.classList.remove('fade-out');
    card.style.animation='none';
    void card.offsetWidth;
    card.style.animation='cardIn 0.7s cubic-bezier(.34,1.56,.64,1) forwards';
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
  },350);
}

function runAway() {
  noCount++;
  noSpeed = Math.min(noCount * 0.3, 2);
  const btn = document.getElementById('noBtn');
  const group = btn.parentElement;
  const gw = group.offsetWidth, bw = btn.offsetWidth;
  const maxX = gw - bw - 4;
  const rx = Math.floor(Math.random()*maxX - maxX/2);
  const ry = (Math.random()>0.5?1:-1) * (20+Math.random()*30);
  btn.style.transition=`transform ${0.2/noSpeed}s cubic-bezier(.34,1.56,.64,1)`;
  btn.style.transform=`translate(${rx}px,${ry}px) rotate(${(Math.random()-0.5)*30}deg)`;
  const msgs = document.getElementById('rageMsg');
  if(noCount<=noMsgs.length) msgs.textContent = noMsgs[noCount-1];
  if(noCount>=4) btn.style.opacity=String(Math.max(0.2,1-(noCount-3)*0.15));
}

function sayYes() {
  spawnSparkles(window.innerWidth/2,window.innerHeight/2,12);
  const card=document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(()=>{
    card.classList.remove('fade-out');
    card.style.animation='none'; void card.offsetWidth;
    card.style.animation='cardIn 0.7s cubic-bezier(.34,1.56,.64,1) forwards';
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');
    startLoveBar();
    launchConfetti();
  },350);
}

function startLoveBar(){
  const el=document.getElementById('lovePct');
  let v=0;
  const iv=setInterval(()=>{
    v=Math.min(v+2,100);
    el.textContent='ความรัก '+v+'%';
    if(v>=100){clearInterval(iv);el.textContent='ความรัก 100% ♾️';}
  },25);
}

function launchConfetti(){
  const c=document.getElementById('heart-container');
  const confIcons=['🎊','🎉','💖','🌸','✨','💝','🌷'];
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.style.cssText=`position:absolute;left:${Math.random()*100}vw;top:${Math.random()*100}vh;font-size:${20+Math.random()*20}px;z-index:3;animation:sparklePop ${0.6+Math.random()*0.4}s ease forwards;pointer-events:none`;
      el.textContent=confIcons[Math.floor(Math.random()*confIcons.length)];
      c.appendChild(el);
      setTimeout(()=>el.remove(),1100);
    },i*80);
  }
}

function triggerConfetti(){
  launchConfetti();
  spawnSparkles(window.innerWidth/2,window.innerHeight*0.6,15);
}

createParticles();
typeWrite();
</script>
